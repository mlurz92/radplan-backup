<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Animiertes RadPlan Icon Mitarbeiterkalender">
  <defs>
    <linearGradient id="bg" x1="72" y1="56" x2="456" y2="470" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#14304e"/>
    </linearGradient>
    <linearGradient id="panel" x1="120" y1="110" x2="380" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f8fcff"/>
      <stop offset="1" stop-color="#d9eaf8"/>
    </linearGradient>
    <linearGradient id="head" x1="126" y1="126" x2="370" y2="216" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1f7bd2"/>
      <stop offset="1" stop-color="#0f4f93"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(278 314) rotate(90) scale(94)">
      <stop offset="0" stop-color="#67e8f9" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#67e8f9" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="20" y="20" width="472" height="472" rx="104" fill="url(#bg)"/>
  <circle cx="112" cy="116" r="84" fill="#38bdf8" opacity="0.13">
    <animate attributeName="r" values="80;92;80" dur="4.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.08;0.18;0.08" dur="4.2s" repeatCount="indefinite"/>
  </circle>

  <g opacity="0.55">
    <circle cx="398" cy="104" r="4" fill="#e0f2fe">
      <animate attributeName="opacity" values="0;0.85;0" dur="2.4s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="432" cy="140" r="3" fill="#7dd3fc">
      <animate attributeName="opacity" values="0;0.9;0" dur="2.1s" begin="1.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="412" cy="176" r="3" fill="#bae6fd">
      <animate attributeName="opacity" values="0;0.8;0" dur="2.8s" begin="0.7s" repeatCount="indefinite"/>
    </circle>
  </g>

  <rect x="104" y="94" width="304" height="340" rx="52" fill="url(#panel)"/>
  <rect x="104" y="94" width="304" height="94" rx="52" fill="url(#head)"/>

  <g fill="#fff" opacity="0.95">
    <circle cx="162" cy="140" r="7"/>
    <circle cx="190" cy="140" r="7" opacity="0.7"/>
    <circle cx="218" cy="140" r="7" opacity="0.5"/>
  </g>

  <g stroke="#b8d5ec" stroke-width="9" stroke-linecap="round" opacity="0.92">
    <line x1="136" y1="226" x2="376" y2="226"/>
    <line x1="136" y1="278" x2="376" y2="278"/>
    <line x1="136" y1="330" x2="376" y2="330"/>
  </g>
  <g stroke="#c8e0f3" stroke-width="7" opacity="0.8">
    <line x1="206" y1="198" x2="206" y2="392"/>
    <line x1="276" y1="198" x2="276" y2="392"/>
    <line x1="346" y1="198" x2="346" y2="392"/>
  </g>

  <g id="team" transform="translate(0 0)">
    <circle cx="166" cy="358" r="24" fill="#0f6fc4"/>
    <circle cx="166" cy="336" r="13" fill="#dbeafe"/>
    <path d="M142 378c4-12 14-18 24-18s20 6 24 18" fill="#dbeafe"/>
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -4; 0 0" dur="1.8s" repeatCount="indefinite"/>
  </g>

  <g id="checkPulse">
    <circle cx="272" cy="328" r="48" fill="url(#glow)" opacity="0.45">
      <animate attributeName="r" values="44;60;44" dur="1.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.08;0.48;0.08" dur="1.6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g id="check">
    <rect x="236" y="292" width="72" height="72" rx="20" fill="#22d3ee">
      <animate attributeName="fill" values="#22d3ee;#2563eb;#22d3ee" dur="1.5s" repeatCount="indefinite"/>
    </rect>
    <path d="M254 328l15 15 31-31" fill="none" stroke="#fff" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
    <animateTransform attributeName="transform" type="scale" values="1;1.08;1" additive="sum" origin="272 328" dur="1.5s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" values="0 272 328;1.6 272 328;0 272 328" additive="sum" dur="1.5s" repeatCount="indefinite"/>
  </g>

  <rect x="136" y="248" width="240" height="40" fill="#ffffff" opacity="0.22">
    <animate attributeName="y" values="214;354;214" dur="2.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.28;0" dur="2.2s" repeatCount="indefinite"/>
  </rect>
</svg>
